services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend

  adminer:
    image: adminer:5
    container_name: adminer
    restart: always
    ports:
      - "${ADMINER_PORT}:8080"
    networks:
      - backend

  fastify-app:
    build: .
    container_name: fastify-app
    restart: always
    ports:
      - "${APP_PORT}:3000"
    depends_on:
      - postgres
    env_file:
      - .env
    networks:
      - backend

volumes:
  postgres-data:

networks:
  backend:
    driver: bridge